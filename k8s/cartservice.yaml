apiVersion: apps/v1
kind: Deployment

metadata:
  name: cartservice
  namespace: microservices

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cartservice

  template:
    metadata:
      labels:
        app: cartservice

    spec:
      containers:
      - name: cartservice

        image: yugandhar25/cartservice:v1

        ports:
        - containerPort: 7070

        env:
        - name: REDIS_ADDR
          value: "redis-cart:6379"
          

---
apiVersion: v1
kind: Service

metadata:
  name: cartservice
  namespace: microservices

spec:
  selector:
    app: cartservice

  ports:
    - port: 7070
      targetPort: 7070