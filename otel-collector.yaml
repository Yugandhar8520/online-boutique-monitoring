apiVersion: v1
kind: ConfigMap

metadata:
  name: otel-collector-config
  namespace: observability

data:
  otel-collector-config.yaml: |

    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch:

    exporters:

      debug: {}

      otlp:
        endpoint: jaeger-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true

    service:

      pipelines:

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp]

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: otel-collector
  namespace: observability

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:

    metadata:
      labels:
        app: otel-collector

    spec:

      containers:

        - name: otel-collector

          image: otel/opentelemetry-collector-contrib:0.102.1

          args:
            - "--config=/etc/otel-collector-config.yaml"

          ports:
            - containerPort: 4317
            - containerPort: 4318

          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml

      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service

metadata:
  name: otel-collector
  namespace: observability

spec:

  selector:
    app: otel-collector

  ports:

    - name: grpc
      port: 4317
      targetPort: 4317

    - name: http
      port: 4318
      targetPort: 4318